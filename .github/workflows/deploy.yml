name: Deploy docs to Cloudflare Pages

# Builds the Starlight site and deploys it to Cloudflare Pages (project intended for the
# apex domain openbody.dev). The Pages project is created automatically on first run (see the
# "Ensure Cloudflare Pages project exists" step). See DEPLOY.md for the required secrets and
# the one-time manual steps that remain (the three Actions secrets; adding the custom domain).

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch: {}
  # Daily rebuild so edits to the canonical spec (openbody/openbody) are picked up even
  # without an explicit trigger — the build re-syncs SPEC.md/CHANGELOG/schema/conformance at
  # build time (scripts/sync-spec.mjs). Static rebuild; a no-op day just re-uploads identical
  # bytes. 06:17 UTC (off the top of the hour to dodge scheduler congestion).
  schedule:
    - cron: "17 6 * * *"
  # Instant rebuild when the canonical spec repo signals a change. The sender workflow lives
  # in openbody/openbody and POSTs a `spec-updated` repository_dispatch here (see DEPLOY.md
  # "Auto-rebuild on spec changes"). Optional — the daily schedule above is the fallback.
  repository_dispatch:
    types: [spec-updated]

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. The docs repo.
      - name: Checkout openbody-docs
        uses: actions/checkout@v4
        with:
          path: openbody-docs

      # 2. The CANONICAL standard repo, checked out as a sibling so the sync step
      #    (scripts/sync-spec.mjs) can copy SPEC.md / CHANGELOG.md / schema / conformance
      #    at build time. The docs repo never holds a hand-edited fork of the spec.
      #    NOTE: `openbody/openbody` is currently private — this checkout needs a token with
      #    read access to it (STANDARD_REPO_TOKEN). See DEPLOY.md.
      - name: Checkout openbody standard
        uses: actions/checkout@v4
        with:
          repository: openbody/openbody
          path: openbody
          token: ${{ secrets.STANDARD_REPO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: openbody-docs/package-lock.json

      - name: Install dependencies
        working-directory: openbody-docs
        run: npm ci

      - name: Build site
        working-directory: openbody-docs
        # The sync step resolves the standard from OPENBODY_STANDARD; point it at the sibling.
        env:
          OPENBODY_STANDARD: ${{ github.workspace }}/openbody
        run: npm run build

      # Create the Pages project on first run if it doesn't exist yet, so the deploy below
      # doesn't fail with "Project not found". Idempotent: skips creation when it exists.
      - name: Ensure Cloudflare Pages project exists
        working-directory: openbody-docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if npx -y wrangler@3 pages project list | grep -qw openbody-docs; then
            echo "Pages project 'openbody-docs' already exists."
          else
            echo "Creating Pages project 'openbody-docs'…"
            npx -y wrangler@3 pages project create openbody-docs --production-branch=main
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy openbody-docs/dist --project-name=openbody-docs --branch=main
