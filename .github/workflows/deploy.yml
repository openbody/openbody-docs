name: Deploy docs to Cloudflare Pages

# Builds the Starlight site and deploys it to Cloudflare Pages (project intended for the
# apex domain openbody.dev). The Pages project is created automatically on first run (see the
# "Ensure Cloudflare Pages project exists" step). See DEPLOY.md for the required secrets and
# the one-time manual steps that remain (the three Actions secrets; adding the custom domain).

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch: {}
  # Daily rebuild so edits to the canonical spec (openbody/openbody) are picked up even
  # without an explicit trigger — the build re-syncs SPEC.md/CHANGELOG/schema/conformance at
  # build time (scripts/sync-spec.mjs). Static rebuild; a no-op day just re-uploads identical
  # bytes. 06:17 UTC (off the top of the hour to dodge scheduler congestion).
  schedule:
    - cron: "17 6 * * *"
  # Instant rebuild when the canonical spec repo signals a change. The sender workflow lives
  # in openbody/openbody and POSTs a `spec-updated` repository_dispatch here (see DEPLOY.md
  # "Auto-rebuild on spec changes"). Optional — the daily schedule above is the fallback.
  repository_dispatch:
    types: [spec-updated]

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. The docs repo.
      - name: Checkout openbody-docs
        uses: actions/checkout@v7
        with:
          path: openbody-docs

      # 2. The CANONICAL standard repo, checked out as a sibling so the sync step
      #    (scripts/sync-spec.mjs) can copy SPEC.md / CHANGELOG.md / schema / conformance
      #    at build time. The docs repo never holds a hand-edited fork of the spec.
      #    NOTE: `openbody/openbody` is now public, so this checkout no longer requires a token;
      #    STANDARD_REPO_TOKEN is retained for higher API rate limits. See DEPLOY.md.
      - name: Checkout openbody standard
        uses: actions/checkout@v7
        with:
          repository: openbody/openbody
          path: openbody
          token: ${{ secrets.STANDARD_REPO_TOKEN }}

      # 3. openbody-ts, checked out as a sibling of openbody-docs so package.json's
      #    `"@openbody/openbody-ts": "file:../openbody-ts"` (the same local-dev pin used on
      #    a machine with both repos checked out side by side) resolves in CI too — no
      #    package.json change needed for this to work in either environment.
      #    NOTE: `openbody/openbody-ts` is now public, so no token is required; it reuses
      #    STANDARD_REPO_TOKEN (whose fine-grained PAT covers openbody-ts alongside openbody)
      #    rather than a second secret — one credential across the sibling
      #    checkouts this workflow uses. See README.md "Convert tool" section.
      - name: Checkout openbody-ts
        uses: actions/checkout@v7
        with:
          repository: openbody/openbody-ts
          path: openbody-ts
          token: ${{ secrets.STANDARD_REPO_TOKEN }}

      # 4. openbody-registry, checked out as a sibling so openbody-ts's `npm run
      #    sync-crosswalk` (see the build step below) can vendor the exercise-name
      #    resolution data (canonical registry name index + per-app alias tables) via its
      #    default relative path (`../openbody-registry`). Same STANDARD_REPO_TOKEN reuse
      #    as the other now-public checkouts (the fine-grained PAT's repo access list must
      #    also include openbody-registry).
      - name: Checkout openbody-registry
        uses: actions/checkout@v7
        with:
          repository: openbody/openbody-registry
          path: openbody-registry
          token: ${{ secrets.STANDARD_REPO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: openbody-docs/package-lock.json

      # openbody-ts's package.json points `main`/`exports` at `dist/`, which is gitignored —
      # a fresh checkout has no dist/ until it's built. Locally this is easy to miss (a
      # developer's sibling checkout usually already has one from a previous `npm run
      # build`), but CI starts from a clean checkout every time, so this step is required,
      # not optional, before openbody-docs's `file:../openbody-ts` dependency can resolve.
      # sync-schema (normally run via the `prepack` hook, which plain `npm run build` does
      # NOT trigger) must run first too — validate.ts statically imports the vendored
      # schema (also gitignored), and `tsc` fails outright if it's missing rather than
      # producing a broken build. sync-schema reads the sibling `openbody` checkout via the
      # same default relative path (`../openbody`) this workflow already lays out.
      # sync-crosswalk is the same pattern for the exercise-name resolver: src/resolve.ts
      # statically imports the (gitignored) vendor/crosswalk.json snapshot, built from the
      # sibling `openbody-registry` checkout above.
      - name: Build openbody-ts
        working-directory: openbody-ts
        run: npm ci && npm run sync-schema && npm run sync-crosswalk && npm run build

      - name: Install dependencies
        working-directory: openbody-docs
        run: npm ci

      - name: Build site
        working-directory: openbody-docs
        # The sync step resolves the standard from OPENBODY_STANDARD; point it at the sibling.
        env:
          OPENBODY_STANDARD: ${{ github.workspace }}/openbody
        run: npm run build

      # Create the Pages project on first run if it doesn't exist yet, so the deploy below
      # doesn't fail with "Project not found". Idempotent: skips creation when it exists.
      - name: Ensure Cloudflare Pages project exists
        working-directory: openbody-docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if npx -y wrangler@3 pages project list | grep -qw openbody-docs; then
            echo "Pages project 'openbody-docs' already exists."
          else
            echo "Creating Pages project 'openbody-docs'…"
            npx -y wrangler@3 pages project create openbody-docs --production-branch=main
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          # Pin the Wrangler CLI to v3 to match the project-create step above. wrangler-action@v4
          # defaults the CLI to v4 when unset; pinning keeps deploy behavior identical to before
          # this action bump (the bump was only to get the action off the deprecated Node 20).
          wranglerVersion: "3"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy openbody-docs/dist --project-name=openbody-docs --branch=main
